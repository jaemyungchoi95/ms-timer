<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>퇴근까지</title>
    <link rel="stylesheet" href="themes.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="clock" class="clock">
      <div class="stack">
        <header class="header">
          <h1 id="title" class="title">퇴근까지</h1>
          <div class="target" id="target"></div>
        </header>
        <div class="frame">
        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>
        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>

        <div class="sep">:</div>

        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>
        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>

        <div class="sep">:</div>

        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>
        <div class="flip" data-flip>
          <div class="flip-top"><span>0</span></div>
          <div class="flip-bottom"><span>0</span></div>
          <div class="flip-fold-top"><span>0</span></div>
          <div class="flip-fold-bottom"><span>0</span></div>
        </div>

        <div class="dot">.</div>

        <div class="reel" data-reel="100">
          <div class="reel-strip">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span>
          </div>
        </div>
        <div class="reel" data-reel="10">
          <div class="reel-strip">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span>
          </div>
        </div>
        <div class="reel" data-reel="1">
          <div class="reel-strip">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span>
          </div>
        </div>
      </div>      <!-- .frame -->
      </div>        <!-- .stack -->
    </main>
    <script type="module" src="clock.js"></script>
  </body>
</html>
